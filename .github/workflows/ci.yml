name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install solc
        run: |
          curl -L -o solc-static-linux https://github.com/ethereum/solidity/releases/download/v0.8.30/solc-static-linux
          chmod +x solc-static-linux
          sudo mv solc-static-linux /usr/local/bin/solc
          solc --version

      - name: Tool versions
        run: |
          lean --version
          lake --version
          forge --version
          cast --version
          solc --version
          just --version

      - name: Build Lean package
        run: just build

      - name: Check target registry
        run: just target-registry

      - name: Check EVM semantic plan
        run: just evm-plan

      - name: Check Solana light gates
        run: just solana-light

      - name: Check documentation translations
        run: just docs-check

      - name: Check Wasm-NEAR diagnostics
        run: scripts/near/diagnostic-smoke.sh

      - name: Check Wasm-NEAR IR coverage manifest
        run: scripts/near/check-ir-coverage-manifest.py

      - name: Check EmitWat IR coverage manifest
        run: scripts/near/check-ir-coverage-manifest.py --manifest Tests/EmitWatCoverage.tsv --label emitwat-ir-coverage

      - name: Check IR ownership rules
        run: lake env lean --run Tests/IROwnership.lean

      - name: Check Wasm-NEAR formal semantics anchors
        run: lake env lean --run Tests/NearWasmFormal.lean

      - name: Run EmitWat offline host smoke
        run: scripts/near/emitwat-ci-smoke.sh

      - name: Check Psy golden sources
        run: just psy-golden-sources

      - name: Check Psy diagnostics
        run: just psy-diagnostics

      - name: Check Psy IR coverage manifest
        run: just psy-coverage

      - name: Check EVM diagnostics
        run: just evm-diagnostics

      - name: Check EVM IR coverage manifest
        run: just evm-coverage

      - name: Run EVM ABI scalar IR smoke
        run: just evm-smoke abi-scalar

      - name: Run EVM AssertProbe IR smoke
        run: just evm-smoke assert

      - name: Run EVM AssignmentProbe IR smoke
        run: just evm-smoke assignment

      - name: Run EVM AssignOpProbe IR smoke
        run: just evm-smoke assign-op

      - name: Run EVM ConditionalProbe IR smoke
        run: just evm-smoke conditional

      - name: Run EVM LoopProbe IR smoke
        run: just evm-smoke loop

      - name: Run EVM ContextProbe IR smoke
        run: just evm-smoke context

      - name: Run EVM EventProbe IR smoke
        run: just evm-smoke event

      - name: Run EVM CrosscallProbe IR smoke
        run: just evm-smoke crosscall

      - name: Run EVM ExpressionProbe IR smoke
        run: just evm-smoke expression

      - name: Run EVM HashProbe IR smoke
        run: just evm-smoke hash

      - name: Run EVM MapProbe IR smoke
        run: just evm-smoke map

      - name: Run EVM TypedMapProbe IR smoke
        run: just evm-smoke typed-map

      - name: Run EVM StorageArrayProbe IR smoke
        run: just evm-smoke storage-array

      - name: Run EVM StorageStructProbe IR smoke
        run: just evm-smoke storage-struct

      - name: Run EVM TypedStorageProbe IR smoke
        run: just evm-smoke typed-storage

      - name: Run EVM ArrayValueProbe IR smoke
        run: just evm-smoke array-value

      - name: Run EVM StructArrayValueProbe IR smoke
        run: just evm-smoke struct-array-value

      - name: Run EVM StructValueProbe IR smoke
        run: just evm-smoke struct-value

      - name: Run EVM AbiAggregateProbe IR smoke
        run: just evm-smoke abi-aggregate

      - name: Build EVM examples
        run: just evm-build-examples

      - name: Run Foundry smoke tests
        run: just evm-foundry

      - name: Run Anvil deploy smoke
        run: just evm-anvil-deploy
