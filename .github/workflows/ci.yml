name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Product-first gate (required): business sources × multi-target materialize.
  # Fails the PR before backend-heavy Solana/EVM/NEAR probe suites run.
  product:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install solc
        run: |
          curl -L -o solc-static-linux https://github.com/ethereum/solidity/releases/download/v0.8.30/solc-static-linux
          chmod +x solc-static-linux
          sudo mv solc-static-linux /usr/local/bin/solc
          solc --version

      - name: Install wabt
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Tool versions
        run: |
          lean --version
          lake --version
          just --version
          solc --version
          wat2wasm --version
          cast --version

      - name: Build Lean package
        run: just build

      - name: Product multi-target gate
        run: just product

  build-test:
    runs-on: ubuntu-latest
    needs: [product]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install solc
        run: |
          curl -L -o solc-static-linux https://github.com/ethereum/solidity/releases/download/v0.8.30/solc-static-linux
          chmod +x solc-static-linux
          sudo mv solc-static-linux /usr/local/bin/solc
          solc --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Install Solana testkit tools
        run: scripts/solana/install-testkit-ci-tools.sh

      - name: Install wabt
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quint CLI
        run: npm install -g @informalsystems/quint

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Tool versions
        run: |
          lean --version
          lake --version
          forge --version
          cast --version
          solc --version
          rustc --version
          cargo --version
          just --version
          wat2wasm --version
          node --version
          npm --version
          quint --version
          java -version

      - name: Build Lean package
        run: just build

      - name: Check target registry
        run: just target-registry

      - name: Check ContractSpec JSON schema
        run: just contract-spec-json

      - name: Check generated contract clients
        run: just contract-client

      - name: Check EVM semantic plan
        run: just evm-plan

      - name: Check Solana light gates
        run: just solana-light

      - name: Check documentation translations
        run: just docs-check

      - name: Check Wasm-NEAR diagnostics
        run: scripts/near/diagnostic-smoke.sh

      - name: Check Wasm-NEAR IR coverage manifest
        run: scripts/near/check-ir-coverage-manifest.py

      - name: Check EmitWat IR coverage manifest
        run: scripts/near/check-ir-coverage-manifest.py --manifest Tests/Backend/Wasm/EmitWatCoverage.tsv --label emitwat-ir-coverage

      - name: Check IR ownership rules
        run: lake env lean --run Tests/IROwnership.lean

      - name: Check formal semantics anchors
        run: |
          just ir-counter-semantics-smoke
          just counter-universal-refinement-smoke
          just supported-fragment-smoke
          just target-semantics-instances-smoke
          lake build ProofForge.Backend.Evm.Refinement
          lake build ProofForge.Contract.Examples.ValueVaultInvariant
          lake env lean --run Tests/NearWasmFormal.lean

      - name: Run EmitWat offline host smoke
        run: scripts/near/emitwat-ci-smoke.sh

      - name: Run Wasm-NEAR target-first smoke
        run: just near-target-first

      - name: Check contract_source target diagnostics
        run: just contract-source-diagnostics

      - name: Run unified testkit
        run: just testkit

      - name: Check Psy golden sources
        run: just psy-golden-sources

      - name: Check Psy diagnostics
        run: just psy-diagnostics

      - name: Check Psy IR coverage manifest
        run: just psy-coverage

      - name: Run Psy plan-driven metadata unit tests
        run: just psy-metadata

      - name: Run Psy metadata validation unit tests
        run: just psy-metadata-validation

      - name: Run Psy metadata CLI smoke test
        run: just psy-metadata-cli

      - name: Run Quint MBT replay gate
        run: just quint-mbt-gate

      - name: Run Quint IR model gate
        run: just quint-ir-model-gate

      - name: Check EVM diagnostics
        run: just evm-diagnostics

      - name: Check EVM IR coverage manifest
        run: just evm-coverage

      - name: Run EVM IR smoke suite
        run: just evm-ir-smokes

      - name: Build EVM examples
        run: just evm-build-examples

      - name: Run Foundry smoke tests
        run: just evm-foundry

      - name: Run Anvil deploy smoke
        run: just evm-anvil-deploy

      - name: Run dynamic constructor Anvil smoke
        run: just evm-dynamic-constructor-anvil

      # Counter + RemoteCall already covered by the required `product` job.
      - name: Run three-chain portable RoleGatedToken smoke
        run: just portable-role-gated-token-multi-target

      - name: Run three-chain portable StakingVault smoke
        run: just portable-staking-vault-multi-target

  solana-pinocchio-live:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      PROOF_FORGE_AGAVE_RELEASE: v3.1.12
      PROOF_FORGE_SBF_TOOLS_VERSION: v1.52
      PROOF_FORGE_SURFPOOL_TAG: v0.10.8
      PROOF_FORGE_SBPF_REV: d835bc6e638e4f55b88f31a31bbc92e3a2e0a5ba
      PROOF_FORGE_SBPF_VERSION: 0.2.2
      PROOF_FORGE_PINOCCHIO_USE_RUSTUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler libudev-dev

      - name: Cache Solana live toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install
            ~/.cargo/bin/sbpf
            ~/.cargo/bin/surfpool
            ~/.cargo/git
            ~/.cargo/registry
          key: solana-pinocchio-live-${{ runner.os }}-${{ env.PROOF_FORGE_AGAVE_RELEASE }}-${{ env.PROOF_FORGE_SBF_TOOLS_VERSION }}-${{ env.PROOF_FORGE_SURFPOOL_TAG }}-${{ env.PROOF_FORGE_SBPF_REV }}-${{ hashFiles('scripts/solana/install-pinocchio-live-ci-tools.sh') }}
          restore-keys: |
            solana-pinocchio-live-${{ runner.os }}-${{ env.PROOF_FORGE_AGAVE_RELEASE }}-${{ env.PROOF_FORGE_SBF_TOOLS_VERSION }}-${{ env.PROOF_FORGE_SURFPOOL_TAG }}-
            solana-pinocchio-live-${{ runner.os }}-${{ env.PROOF_FORGE_AGAVE_RELEASE }}-${{ env.PROOF_FORGE_SBF_TOOLS_VERSION }}-

      - name: Install Solana live toolchain
        run: scripts/solana/install-pinocchio-live-ci-tools.sh

      - name: Tool versions
        run: |
          lean --version
          lake --version
          rustc --version
          cargo --version
          solana --version
          solana-keygen --version
          cargo-build-sbf --version
          sbpf --version
          surfpool --version || true
          node --version
          npm --version
          just --version

      - name: Build proof-forge
        run: just build

      - name: Run Solana Pinocchio live equivalence
        run: just solana-pinocchio-live-equivalence

  aleo-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Leo
        id: install-leo
        run: |
          if ! curl -sSfL https://github.com/AleoHQ/leo/releases/download/v4.0.2/leo-ubuntu-latest > /tmp/leo; then
            echo "Leo binary unavailable; skipping Aleo smoke."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          chmod +x /tmp/leo
          sudo mv /tmp/leo /usr/local/bin/leo
          leo --version
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Build proof-forge
        if: steps.install-leo.outputs.available == 'true'
        run: just build

      - name: Run Aleo Counter fail-closed smoke
        if: steps.install-leo.outputs.available == 'true'
        run: ./scripts/aleo/counter-smoke.sh

      - name: Run Aleo PureMath smoke
        if: steps.install-leo.outputs.available == 'true'
        run: ./scripts/aleo/pure-math-smoke.sh

      - name: Run full Aleo Leo build smoke
        if: steps.install-leo.outputs.available == 'true'
        run: just aleo-leo-build-smoke

      - name: Skip Aleo smoke
        if: steps.install-leo.outputs.available != 'true'
        run: echo "Aleo smoke skipped because Leo was not available."

  cloudflare-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Node and wrangler
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g typescript wrangler
          tsc --version
          wrangler --version

      - name: Build proof-forge
        run: just build

      - name: Run TypeScript / Cloudflare Workers smoke
        run: ./scripts/ts/counter-ir-smoke.sh

  cosmwasm-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install wabt (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt
          wat2wasm --version

      - name: Install cosmwasm-check
        run: |
          cargo install cosmwasm-check --version 2.2.9 --locked
          cosmwasm-check --version

      - name: Build proof-forge
        run: just build

      - name: Run CosmWasm Counter smoke
        run: just cosmwasm-counter-smoke

  aptos-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.48.0

      - name: Install Lean
        run: |
          toolchain="$(cat lean-toolchain)"
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain "$toolchain"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Aptos CLI
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -sSfL https://aptos.dev/scripts/install_cli.sh -o aptos-install.sh
          bash aptos-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          aptos --version

      - name: Build proof-forge
        run: just build

      - name: Run Aptos diagnostics
        run: just aptos-diagnostics

      - name: Run Aptos Counter smoke
        run: just aptos-counter-smoke
        env:
          PROOF_FORGE_APTOS_TIMEOUT: "600"
