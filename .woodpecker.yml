# Codeberg Woodpecker CI for proof_forge.
#
# One-time setup (repo owner):
#   1. Request access: https://codeberg.org/Codeberg-e.V./requests/issues/new?template=ISSUE_TEMPLATE%2fWoodpecker-CI.yaml
#   2. Log in at https://ci.codeberg.org with your Codeberg account
#   3. Enable this repo at https://ci.codeberg.org/repos/add
#
# Triggers: push and pull_request (all branches).
# Gates (product-first):
#   1. `just product` — business sources × multi-target (fail fast)
#   2. `just check` — full static baseline (includes product again + backend)

when:
  - event: [push, pull_request]

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

steps:
  - name: proof-forge-product
    image: ubuntu:24.04
    commands:
      - export PATH="$HOME/.elan/bin:$HOME/.cargo/bin:$HOME/.foundry/bin:$HOME/.local/bin:$HOME/.local/share/solana/install/active_release/bin:/usr/local/bin:$PATH"
      - scripts/ci/woodpecker-setup.sh
      - just product

  - name: proof-forge-check
    image: ubuntu:24.04
    commands:
      - export PATH="$HOME/.elan/bin:$HOME/.cargo/bin:$HOME/.foundry/bin:$HOME/.local/bin:$HOME/.local/share/solana/install/active_release/bin:/usr/local/bin:$PATH"
      # Setup already ran in product step on the same workspace when sequential;
      # re-run setup for isolated step images.
      - scripts/ci/woodpecker-setup.sh
      - just check
      - just wave-t-gate
