name = "proof-forge-counter-spike"
main = "src/worker.js"
compatibility_date = "2026-03-17"

# Workers KV namespace for the Counter state.
# Create it with: wrangler kv namespace create COUNTER_KV
# Then paste the id below.
[[kv_namespaces]]
binding = "COUNTER_KV"
id = "<YOUR_KV_NAMESPACE_ID>"
preview_id = "<YOUR_PREVIEW_KV_NAMESPACE_ID>"
