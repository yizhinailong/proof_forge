# PF-P2-01: map/array capability family — shared product source across primary triad.
# Pure fixed-array queries (no storage); exercises data.fixed_array on EVM/Solana/NEAR.
[scenario]
name = "array-example"
fixture = "array-example"
source = "Examples/Product/ArrayExample.lean"
targets = ["wasm-near", "evm", "solana-sbpf-asm"]
capabilities = ["data.fixed_array", "entrypoint.external"]

[scenario.reference.toolchain]
revm = "41.0.0"
mollusk = "0.13.4"
wasmtime = "26.0.1"
sbpf = "0.2.2"

[[artifact]]
target = "wasm-near"
name = "wat"
contains = [
  '(func $sizeOf3 (export "sizeOf3")',
  '(func $getElem (export "getElem")',
  '(func $sumOf3 (export "sumOf3")',
]

[[artifact]]
target = "wasm-near"
name = "metadata"

[[artifact.json]]
path = "schemaVersion"
kind = "integer"
equals = 1

[[artifact.json]]
path = "target"
