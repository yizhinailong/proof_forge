[scenario]
name = "counter"
fixture = "counter"
targets = ["wasm-near", "evm", "solana-sbpf-asm"]
capabilities = ["storage.scalar", "entrypoint.external"]

[[artifact]]
target = "solana-sbpf-asm"
name = "sbpf-asm"
matches_file = "Examples/Solana/Counter.golden.s"

[[artifact]]
target = "solana-sbpf-asm"
name = "manifest"
matches_file = "Examples/Solana/Counter.manifest.toml"

[[artifact.toml]]
path = "target"
equals = "solana-sbpf-asm"

[[artifact.toml]]
path = "program.name"
equals = "counter"

[[artifact.toml]]
path = "instruction[0].name"
equals = "initialize"

[[artifact.toml]]
path = "instruction[0].tag"
equals = 0

[[artifact.toml]]
path = "instruction[1].name"
equals = "increment"

[[artifact.toml]]
path = "instruction[1].tag"
equals = 1

[[artifact.toml]]
path = "instruction[2].name"
equals = "get"

[[artifact.toml]]
path = "instruction[2].tag"
equals = 2

[[artifact]]
target = "solana-sbpf-asm"
name = "metadata"

[[artifact.json]]
path = "target"
equals = "solana-sbpf-asm"

[[artifact.json]]
path = "targetFamily"
equals = "solana"

[[artifact.json]]
path = "artifactKind"
equals = "solana-elf"

[[artifact.json]]
path = "fixture"
equals = "counter-ir-sbpf"

[[artifact.json]]
path = "sourceKind"
equals = "portable-ir"

[[artifact.json]]
path = "capabilities"
contains = "storage.scalar"

[[artifact.json]]
path = "capabilities"
contains = "account.explicit"

[[artifact.json]]
path = "capabilities"
contains = "control.conditional"

[[artifact.json]]
path = "validation.manifestGeneration"
equals = "passed"

[[artifact]]
target = "evm"
name = "metadata"

[[artifact.json]]
path = "target"
equals = "evm"

[[artifact.json]]
path = "targetFamily"
equals = "evm"

[[artifact.json]]
path = "artifactKind"
equals = "evm-bytecode"

[[artifact.json]]
path = "fixture"
equals = "Counter"

[[artifact.json]]
path = "sourceKind"
equals = "portable-ir"

[[artifact.json]]
path = "capabilities"
contains = "storage.scalar"

[[artifact.json]]
path = "abi.entrypoints[0].name"
equals = "initialize"

[[artifact.json]]
path = "abi.entrypoints[1].name"
equals = "increment"

[[artifact.json]]
path = "abi.entrypoints[2].name"
equals = "get"

[[artifact.json]]
path = "validation.solcStrictAssembly"
equals = "passed"

[[artifact.json]]
path = "validation.bytecodeGeneration"
equals = "passed"

[[step]]
call = "initialize"

[[step]]
call = "get"
[step.expect.return]
u64 = 0

[[step]]
call = "increment"

[[step]]
call = "get"
[step.expect.return]
u64 = 1
