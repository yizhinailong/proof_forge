# PF-P2-01: auth/policy capability family — Ownable product source across primary triad.
# Semantic path: init (caller becomes owner) → transferOwnership(99) → owner == 99.
[scenario]
name = "ownable"
fixture = "ownable"
source = "Examples/Product/Ownable.lean"
targets = ["wasm-near", "evm", "solana-sbpf-asm"]
capabilities = ["storage.scalar", "entrypoint.external", "caller.sender", "assertions.check"]

[scenario.reference.toolchain]
revm = "41.0.0"
mollusk = "0.13.4"
wasmtime = "26.0.1"
sbpf = "0.2.2"

[[artifact]]
target = "wasm-near"
name = "wat"
contains = [
  '(func $init (export "init")',
  '(func $owner (export "owner")',
  '(func $transferOwnership (export "transferOwnership")',
  '(func $renounceOwnership (export "renounceOwnership")',
]

