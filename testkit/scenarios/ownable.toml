# Shared semantic steps: portable owner handle becomes 99 after transfer.
[[step]]
call = "init"

[[step]]
call = "transferOwnership"
[[step.arg]]
u64 = 99

[[step]]
call = "owner"
[step.expect.return]
u64 = 99
