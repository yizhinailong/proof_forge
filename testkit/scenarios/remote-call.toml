[[artifact.json]]
path = "instructions"
kind = "array"
non_empty = true
length = 3

[[artifact]]
target = "solana-sbpf-asm"
name = "client"
contains = [
  'export const IDL = ',
  'encodeInstructionData',
  'createInstruction',
]

# Shared portable step: initialize marker state without peer execution.
[[step]]
call = "initialize"

# PF-P2-03: real Solana CPI peer — PeerOracleSum ELF returns u64 49; RemoteCall
# call_with_args (42+7 fixed args) observes peer return via sol_get_return_data.
[[step]]
call = "call_with_args"
targets = ["solana-sbpf-asm"]

[step.expect.return]
u64 = 49
