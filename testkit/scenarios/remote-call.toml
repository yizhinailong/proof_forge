# PF-P2-01: remote/crosscall capability family — RemoteCall product source across
# primary triad. Shared step is initialize (marker=0); call_remote/CPI peer
# equivalence is PF-P2-03. Artifact checks prove CALL / CPI / promise_create.
[scenario]
name = "remote-call"
fixture = "remote-call"
source = "Examples/Product/RemoteCall.lean"
targets = ["wasm-near", "evm", "solana-sbpf-asm"]
capabilities = ["storage.scalar", "entrypoint.external", "crosscall.invoke"]

[scenario.reference.toolchain]
revm = "41.0.0"
mollusk = "0.13.4"
wasmtime = "26.0.1"
sbpf = "0.2.2"

[[artifact]]
target = "wasm-near"
name = "wat"
contains = [
  '(func $initialize (export "initialize")',
  '(func $call_remote (export "call_remote")',
  'promise_create',
]

[[artifact]]
target = "wasm-near"
name = "metadata"

[[artifact.json]]
path = "schemaVersion"
kind = "integer"
equals = 1

[[artifact.json]]
path = "target"
kind = "string"
equals = "wasm-near"

[[artifact.json]]
path = "fixture"
equals = "remotecall"

[[artifact.json]]
path = "sourceKind"
equals = "contract-sdk"

[[artifact.json]]
path = "sourceModule"
equals = "RemoteCall"

[[artifact.json]]
path = "capabilities"
kind = "array"
non_empty = true

[[artifact.json]]
path = "capabilities"
contains = "crosscall.invoke"

[[artifact.json]]
path = "abi.entrypoints"
kind = "array"
non_empty = true
length = 3

[[artifact.json]]
path = "validation.emitWat"
equals = "passed"

[[artifact.json]]
path = "validation.wat2wasm"
equals = "passed"

[[artifact.file]]
path = "artifacts.wat"
artifact = "wat"

[[artifact.file]]
path = "artifacts.deployManifest"
artifact = "deploy-manifest"

[[artifact]]
target = "wasm-near"
name = "deploy-manifest"

[[artifact.json]]
path = "kind"
kind = "string"
equals = "proof-forge-wasm-near-deploy-manifest"

[[artifact]]
target = "evm"
name = "yul"
contains = [
  'object "RemoteCall"',
  'function f_RemoteCall_initialize',
  'function f_RemoteCall_call_remote',
