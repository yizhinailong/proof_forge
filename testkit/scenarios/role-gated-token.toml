[scenario]
name = "role-gated-token"
fixture = "role-gated-token"
source = "Examples/Shared/RoleGatedToken.lean"
targets = ["evm"]
capabilities = ["storage.scalar", "storage.map", "entrypoint.external", "events.emit", "caller.sender"]

[scenario.reference.toolchain]
revm = "41.0.0"

[[artifact]]
target = "evm"
name = "yul"
contains = [
  'object "RoleGatedToken"',
  'case 0x',
  'function f_RoleGatedToken_',
]

[[artifact]]
target = "evm"
name = "bytecode"
contains = ["60e0"]

[[artifact]]
target = "evm"
name = "metadata"

[[artifact.json]]
path = "schemaVersion"
kind = "integer"
equals = 1

[[artifact.json]]
path = "target"
kind = "string"
equals = "evm"

[[artifact.json]]
path = "targetFamily"
kind = "string"
equals = "evm"

[[artifact.json]]
path = "artifactKind"
kind = "string"
equals = "evm-bytecode"

[[artifact.json]]
path = "fixture"
kind = "string"
equals = "RoleGatedToken"

[[artifact.json]]
path = "sourceKind"
kind = "string"
equals = "contract-sdk"

[[artifact.json]]
path = "capabilities"
kind = "array"
non_empty = true

[[artifact.json]]
path = "abi.entrypoints"
kind = "array"
non_empty = true

# Scenario steps — only no-arg calls
[[step]]
call = "init"

[[step]]
call = "totalSupply"
[step.expect.return]
u64 = 0