[scenario]
name = "value-vault"
fixture = "value-vault"
targets = ["wasm-near", "evm", "solana-sbpf-asm"]
capabilities = ["storage.scalar", "entrypoint.external", "events.emit", "env.block"]

[[artifact]]
target = "wasm-near"
name = "wat"
matches_file = "Examples/WasmNear/ValueVault.golden.wat"
contains = [
  '(import "env" "block_index"',
  '(func $deposit (export "deposit")',
  '(func $snapshot (export "snapshot")',
  'call $log_utf8',
]

[[artifact]]
target = "evm"
name = "yul"
matches_file = "Examples/Evm/ValueVault.golden.yul"
contains = [
  'object "ValueVault"',
  'function f_ValueVault_deposit',
  'function f_ValueVault_snapshot',
  'log1',
  'number()',
]

[[artifact]]
target = "evm"
name = "metadata"

[[artifact.json]]
path = "target"
equals = "evm"

[[artifact.json]]
path = "targetFamily"
equals = "evm"

[[artifact.json]]
path = "artifactKind"
equals = "evm-bytecode"

[[artifact.json]]
path = "fixture"
equals = "ValueVault"

[[artifact.json]]
path = "sourceKind"
equals = "contract-sdk"

[[artifact.json]]
path = "capabilities"
contains = "storage.scalar"

[[artifact.json]]
path = "capabilities"
contains = "events.emit"

[[artifact.json]]
path = "capabilities"
contains = "env.block"

[[artifact.json]]
path = "abi.entrypoints[0].name"
equals = "initialize"

[[artifact.json]]
path = "abi.entrypoints[1].name"
equals = "deposit"

[[artifact.json]]
path = "abi.entrypoints[2].name"
equals = "charge_fee"

[[artifact.json]]
path = "abi.entrypoints[3].name"
equals = "release"

[[artifact.json]]
path = "abi.entrypoints[4].name"
equals = "snapshot"

[[artifact.json]]
path = "abi.entrypoints[5].name"
equals = "get_balance"

[[artifact.json]]
path = "abi.entrypoints[6].name"
equals = "get_net_value"

[[artifact.json]]
path = "validation.solcStrictAssembly"
equals = "passed"

[[artifact.json]]
path = "validation.bytecodeGeneration"
equals = "passed"

[[artifact.file]]
path = "artifacts.yul"
artifact = "yul"

[[artifact.file]]
path = "artifacts.bytecode"
artifact = "bytecode"

[[artifact.file]]
path = "artifacts.initCode"
artifact = "init-code"

[[artifact.file]]
path = "artifacts.deployManifest"
artifact = "deploy-manifest"

[[artifact]]
target = "solana-sbpf-asm"
name = "sbpf-asm"
matches_file = "Examples/Solana/ValueVault.golden.s"
contains = [
  'solana.event.emit ValueDeposited',
  'solana.event.emit ValueSnapshot',
  'call sol_log_64_',
  'call sol_get_clock_sysvar',
  'stxdw [r1+136]',
]

[[artifact]]
target = "solana-sbpf-asm"
name = "manifest"
matches_file = "Examples/Solana/ValueVault.manifest.toml"
contains = [
  'name = "deposit"',
  'name = "charge_fee"',
  'name = "snapshot"',
  '{ name = "amount", type = "U64", offset = 1, byte_size = 8, encoding = "le-u64" }',
  '{ name = "fee_bps", type = "U64", offset = 9, byte_size = 8, encoding = "le-u64" }',
]

[[artifact.toml]]
path = "target"
equals = "solana-sbpf-asm"

[[artifact.toml]]
path = "program.name"
equals = "valuevault"

[[artifact.toml]]
path = "instruction[0].name"
equals = "initialize"

[[artifact.toml]]
path = "instruction[0].tag"
equals = 0

[[artifact.toml]]
path = "instruction[1].name"
equals = "deposit"

[[artifact.toml]]
path = "instruction[1].tag"
equals = 1

[[artifact.toml]]
path = "instruction[2].name"
equals = "charge_fee"

[[artifact.toml]]
path = "instruction[2].tag"
equals = 2

[[artifact.toml]]
path = "instruction[3].name"
equals = "release"

[[artifact.toml]]
path = "instruction[3].tag"
equals = 3

[[artifact.toml]]
path = "instruction[4].name"
equals = "snapshot"

[[artifact.toml]]
path = "instruction[4].tag"
equals = 4

[[artifact.toml]]
path = "instruction[5].name"
equals = "get_balance"

[[artifact.toml]]
path = "instruction[5].tag"
equals = 5

[[artifact.toml]]
path = "instruction[6].name"
equals = "get_net_value"

[[artifact.toml]]
path = "instruction[6].tag"
equals = 6

[[artifact]]
target = "solana-sbpf-asm"
name = "metadata"
contains = [
  '"fixture":"value-vault-ir-sbpf"',
  '"sourceKind":"contract-sdk"',
  '"target":"solana-sbpf-asm"',
]

[[artifact.json]]
path = "target"
equals = "solana-sbpf-asm"

[[artifact.json]]
path = "targetFamily"
equals = "solana"

[[artifact.json]]
path = "artifactKind"
equals = "solana-elf"

[[artifact.json]]
path = "fixture"
equals = "value-vault-ir-sbpf"

[[artifact.json]]
path = "sourceKind"
equals = "contract-sdk"

[[artifact.json]]
path = "capabilities"
contains = "env.block"

[[artifact.json]]
path = "capabilities"
contains = "storage.scalar"

[[artifact.json]]
path = "capabilities"
contains = "events.emit"

[[artifact.json]]
path = "validation.manifestGeneration"
equals = "passed"

[[artifact.file]]
path = "artifacts.sbpfAsm"
artifact = "sbpf-asm"

[[artifact.file]]
path = "artifacts.manifestToml"
artifact = "manifest"

[[artifact.file]]
path = "artifacts.solanaIdl"
artifact = "idl"

[[artifact.file]]
path = "artifacts.solanaClientTs"
artifact = "client"

[[step]]
call = "initialize"
[[step.arg]]
u64 = 100

[[step]]
call = "get_balance"
[step.expect.return]
u64 = 100

[[step]]
call = "deposit"
[[step.arg]]
u64 = 25

[[step]]
call = "get_balance"
[step.expect.return]
u64 = 125

[[step]]
call = "charge_fee"
[[step.arg]]
u64 = 100
[[step.arg]]
u64 = 250

[[step]]
call = "get_balance"
[step.expect.return]
u64 = 223

[[step]]
call = "get_net_value"
[step.expect.return]
u64 = 221

[[step]]
call = "release"
[[step.arg]]
u64 = 23

[[step]]
call = "get_balance"
[step.expect.return]
u64 = 200

[[step]]
call = "snapshot"
[step.expect.return]
u64 = 200

[[step]]
call = "get_net_value"
[step.expect.return]
u64 = 198
